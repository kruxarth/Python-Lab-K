<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Face + ID Attendance System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(145deg, #e8ecf5, #f9fbff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .login-card {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      max-width: 100%;
    }

    .login-card:hover {
      box-shadow: 0 12px 32px rgba(0,0,0,0.15);
    }

    h2 { 
      color: #0d3b66; 
      margin-bottom: 25px; 
      font-weight: 600;
      font-size: 28px;
      letter-spacing: -0.3px;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 18px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s ease;
      outline: none;
      background: #fefefe;
    }

    .form-control:focus {
      border-color: #0d3b66;
      box-shadow: 0 0 0 3px rgba(13, 59, 102, 0.1);
      background: #fff;
    }

    .form-control::placeholder {
      color: #aaa;
      font-weight: 400;
    }

    .btn-custom {
      background: #0d3b66;
      color: #fff;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 5px;
    }

    .btn-custom:hover:not(:disabled) {
      background: #1a4d8c;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(13, 59, 102, 0.2);
    }

    .btn-custom:active {
      transform: translateY(0px);
    }

    .btn-custom:disabled {
      background: #95adc7;
      cursor: not-allowed;
    }

    #msg {
      margin-top: 20px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      min-height: 40px;
    }

    .text-success {
      color: #28a745;
    }

    .text-danger {
      color: #dc3545;
    }

    .mb-3 {
      margin-bottom: 1rem;
    }

    .mt-3 {
      margin-top: 1rem;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 450px) {
      .login-card {
        padding: 30px 25px;
        width: 100%;
        max-width: 340px;
      }
      
      h2 {
        font-size: 24px;
        margin-bottom: 20px;
      }
      
      .form-control {
        padding: 10px 12px;
        font-size: 13px;
      }
      
      .btn-custom {
        padding: 10px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="login-card">
    <h2>Admin Login</h2>
    <form id="loginForm">
      <input type="text" id="username" class="form-control mb-3" placeholder="Username" required autocomplete="username">
      <input type="password" id="password" class="form-control mb-3" placeholder="Password" required autocomplete="current-password">
      <button type="submit" class="btn-custom" id="loginBtn">Login</button>
    </form>
    <p id="msg" class="mt-3"></p>
  </div>

  <script>
  (function() {
    const form = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const msgDiv = document.getElementById("msg");
    const originalBtnText = loginBtn.innerHTML;
    
    function showMessage(message, isError = true) {
      msgDiv.textContent = message;
      msgDiv.className = "mt-3 " + (isError ? "text-danger" : "text-success");
      if (!isError) {
        setTimeout(() => {
          if (msgDiv.textContent === message) {
            msgDiv.textContent = "";
            msgDiv.className = "mt-3";
          }
        }, 5000);
      }
    }
    
    function setLoading(isLoading) {
      if (isLoading) {
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
      } else {
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalBtnText;
      }
    }
    
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      
      if (!username || !password) {
        showMessage("Please enter both username and password", true);
        return;
      }
      
      showMessage("", false);
      setLoading(true);
      
      // 🔓 ALLOW ANY USERNAME AND PASSWORD - NO BACKEND CHECK
      // Simulate login delay for better UX
      setTimeout(() => {
        // Create a fake token for any login attempt
        const fakeToken = "fake_jwt_token_" + Date.now() + "_" + Math.random().toString(36).substr(2);
        
        // Store token
        localStorage.setItem("adminToken", fakeToken);
        localStorage.setItem("adminTokenKey", fakeToken);
        localStorage.setItem("adminUsername", username);
        
        showMessage(`✅ Login successful! Welcome ${username}`, false);
        
        setTimeout(() => {
          window.location.href = "admin.html";
        }, 800);
        
        setLoading(false);
      }, 800);
      
      /*

          localStorage.setItem("adminTokenKey", data.access_token);

          }
          
          showMessage("✅ Login successful! Redirecting to dashboard...", false);
          
          setTimeout(() => {
            window.location.href = "admin.html";
          }, 800);
          
        } else {
          let errorMsg = data.detail || "Invalid credentials. Please try again.";
          if (Array.isArray(errorMsg)) {
            errorMsg = errorMsg.map(err => err.msg).join(", ");
          }
          showMessage(errorMsg, true);
          setLoading(false);
        }
        
      } catch (error) {
        console.error("Login error:", error);
        
        if (error.name === "AbortError") {
          showMessage("Request timeout. Please check if the server is running.", true);
        } else if (error.message.includes("Failed to fetch")) {
          showMessage("❌ Cannot connect to server. Please ensure backend is running at http://127.0.0.1:8000", true);
        } else {
          showMessage(error.message || "An unexpected error occurred.", true);
        }
        
        setLoading(false);
      }
      */
    });
    
    // Check if already logged in (with fake token)
    const existingToken = localStorage.getItem("adminToken");
    if (existingToken) {
      window.location.href = "admin.html";
    }
  })();
  </script>
</body>
</html>
